<!DOCTYPE html>
<html>
    <head>
        <title>Video Editor</title>
        <style>
        body { font-family: Arial; padding: 20px; }
        video { border: 2px solid black; display: block; margin: 10px 0; width: 640px; height: 360px; }
        canvas { border: 2px solid green; display: block; margin: 10px 0; width: 640px; height: 360px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
        </style>
        <script src="GpuProcessor.js"></script>
    </head>
    <body>
       <h1>🎬 Video Editor</h1>
       <input type="file" id="videoFile" accept="video/*">
       <video id="video" controls></video>
       <canvas id="canvas" width="640" height="360"></canvas>
       <button onclick="extractFrame()">📸 Extract Frame</button>
       <button onclick="applyBrightness(1.5)">💡 Brightness (1.5×)</button>
       <button onclick="applyBrightness(0.5)">🌙 Darken (0.5×)</button>
       <button onclick="applyGrayscale()">⚫ Grayscale</button>
       <button onclick="applyContrast(1.5)">🎨 Contrast +</button>
       <button onclick="applyContrast(0.5)">🎨 Contrast -</button>  
       <button onclick="playWithEffects('brightness')">▶️ Play (Brightness)</button>
       <button onclick="playWithEffects('grayscale')">▶️ Play (Grayscale)</button>
       <button onclick="applyGrayscale()">⚫ Grayscale</button>
       <button onclick="applyInvert()">🔄 Invert</button>
       <button onclick="applySepia()">📷 Sepia</button>
       <button onclick="applySaturation(1.5)">🌈 Saturation +</button>
       <button onclick="applySaturation(0.5)">🌈 Saturation -</button>
       <button onclick="stopPlayback()">⏹️ Stop</button>    
       <button onclick="resetFrame()">🔄 Reset</button>
       <button onclick="exportFrame()">⬇️ Export Frame</button>
             <script>
                const videoFile = document.getElementById("videoFile");
                const video = document.getElementById("video");
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');

                videoFile.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const url = URL.createObjectURL(file);
                    video.src = url;
                    console.log('Video loaded : ', file.name);

                    video.addEventListener('loadedmetadata', () => {
                        canvas.width = video.videoWidth || canvas.width;
                        canvas.height = video.videoHeight || canvas.height;
                        console.log('Video metadata loaded, canvas set to', canvas.width, 'x', canvas.height);
                    }, { once: true });
                });

                let originalFrame = null;
                let gpu = null;

                function extractFrame() {
                    if (!video.src) {
                        console.log('No video loaded');
                        return;
                    }

                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                    originalFrame=ctx.getImageData(0, 0, canvas.width, canvas.height);

                    if(!gpu)
                    {
                        gpu = new GPUProcessor(document.createElement('canvas'));
                        gpu.canvas.width = canvas.width;
                        gpu.canvas.height = canvas.height;
                        console.log('GPU Processor created (offscreen canvas)');
                    }

                    console.log('Frame loaded to canvas at time', video.currentTime);
                }
               function applyBrightness(value)
               {
                if(!originalFrame)
                {
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying Brightness : ',value);
                const brightFrame=gpu.brightness(originalFrame,value);

                ctx.putImageData(brightFrame, 0, 0);
                console.log('Brightness applied : ',value);
               }
               function resetFrame()
               {
                if(!originalFrame)
                {
                    console.log('No frame to reset');
                    return;
                }
                ctx.putImageData(originalFrame, 0, 0);
                console.log('Frame reset to original');
               }
               function applyGrayscale()
               {
                if(!originalFrame)
                {
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying grayscale');
                const grayFrame = gpu.grayscale(originalFrame);
                ctx.putImageData(grayFrame, 0, 0);
                console.log('Grayscale applied');
               }
               function applyContrast(value){
                if(!originalFrame){
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying Contrast:', value);
                const contrastFrame = gpu.contrast(originalFrame, value);
                ctx.putImageData(contrastFrame, 0, 0);
                console.log('Contrast applied:', value);
            }
            let playLoop = null;
            function playWithEffects(effectType) {
                if (!gpu) {
                    const offscreenCanvas = document.createElement('canvas');
                    offscreenCanvas.width = canvas.width;
                    offscreenCanvas.height = canvas.height;
                    gpu = new GPUProcessor(offscreenCanvas);
                    console.log('GPU processor created');
                }
                video.play();
                playLoop = setInterval(() => {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let processedFrame;
                    if (effectType === 'brightness') {
                        processedFrame = gpu.brightness(frame, 1.5);
                    } else if (effectType === 'grayscale') {
                        processedFrame = gpu.grayscale(frame);
                    } else if (effectType === 'contrast') {
                        processedFrame = gpu.contrast(frame, 1.5);
                    }
                    ctx.putImageData(processedFrame, 0, 0);
                    if (video.ended) {
                        clearInterval(playLoop);
                        console.log('Playback complete');
                    }
                }, 1000 / 30);
            }
            function stopPlayback() {
                if (playLoop) {
                    clearInterval(playLoop);
                    video.pause();
                    console.log('Playback stopped');
                }
            }
            function applyInvert() {
                if (!originalFrame) {
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying invert');
                const invertFrame = gpu.invert(originalFrame);
                ctx.putImageData(invertFrame, 0, 0);
                console.log('Invert applied');
            }
            function applySepia() {
                if (!originalFrame) {
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying sepia');
                const sepiaFrame = gpu.sepia(originalFrame);
                ctx.putImageData(sepiaFrame, 0, 0);
                console.log('Sepia applied');
            }
            function applySaturation(value) {
                if (!originalFrame) {
                    console.log('No frame extracted');
                    return;
                }
                console.log('Applying saturation:', value);
                const satFrame = gpu.saturation(originalFrame, value);
                ctx.putImageData(satFrame, 0, 0);
                console.log('Saturation applied:', value);
            }
            function exportFrame() {
                if (!originalFrame) {
                    console.log('No frame to export');
                    return;
                }
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = originalFrame.width;
  tempCanvas.height = originalFrame.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.putImageData(originalFrame, 0, 0);

  tempCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `video-frame-${Date.now()}.png`;
    link.click();
    URL.revokeObjectURL(url);
    console.log('Frame exported as PNG');
  }, 'image/png');
}
             </script>
    </body>
</html>
