<!DOCTYPE html>
<html>
    <head>
        <title>CPU VS GPU Performance</title>
    </head>
    <body>
        <button onclick="cpuRun()">Test CPU</button>
        <button onclick="gpuRun()">Test GPU</button>

        <script>
            const SIZE=1000000;
            let arr=new Float32Array(SIZE);

            for(let i=0;i<SIZE;i++)
            {
                arr[i]=i;
            }

            function cpuRun()
            {
                const start=performance.now();
                for(let i=0;i<SIZE;i++)
                {
                    arr[i]=arr[i]*2;
                }
                const end=performance.now();
                console.log(`Time : ${end-start} ms`);
            }

            async function gpuRun() {
                if (!navigator.gpu) {
                    console.log("WebGPU not supported");
                    return;
                }

                try {
                    const adapter = await navigator.gpu.requestAdapter();
                    if (!adapter) {
                        console.log("No GPU adapter available");
                        return;
                    }
                    const device = await adapter.requestDevice();

                    const buffer = device.createBuffer({
                        size: arr.byteLength,
                        usage:
                            GPUBufferUsage.STORAGE |
                            GPUBufferUsage.COPY_SRC |
                            GPUBufferUsage.COPY_DST,
                        mappedAtCreation: true,
                    });

                    new Float32Array(buffer.getMappedRange()).set(arr);
                    buffer.unmap();

                    const shader = `@group(0) @binding(0) var<storage, read_write> data: array<f32>;

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) global_id : vec3<u32>) {
  let i: u32 = global_id.x;
  if (i < ${SIZE}u) {
    data[i] = data[i] * 2.0;
  }
}`;

                    const module = device.createShaderModule({ code: shader });

                    const pipeline = device.createComputePipeline({
                        layout: "auto",
                        compute: { module, entryPoint: "main" },
                    });

                    const bindGroup = device.createBindGroup({
                        layout: pipeline.getBindGroupLayout(0),
                        entries: [
                            {
                                binding: 0,
                                resource: { buffer },
                            },
                        ],
                    });

                    const commandEncoder = device.createCommandEncoder();
                    const passEncoder = commandEncoder.beginComputePass();

                    const start = performance.now();

                    passEncoder.setPipeline(pipeline);
                    passEncoder.setBindGroup(0, bindGroup);
                    passEncoder.dispatchWorkgroups(Math.ceil(SIZE / 64));
                    passEncoder.end();

                    device.queue.submit([commandEncoder.finish()]);
                    await device.queue.onSubmittedWorkDone();

                    const end = performance.now();
                    console.log("GPU Time:", end - start, "ms");
                } catch (err) {
                    console.error("GPU run failed:", err);
                }
            }
        </script>
    </body>
</html>
